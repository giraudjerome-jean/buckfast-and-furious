name: daily-buckfast

on:
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create daily placeholder update
        run: |
          mkdir -p data
          python - <<'PY'
          import json, os, datetime

          path = "data/archive.json"
          today = datetime.datetime.utcnow().strftime("%Y-%m-%d")

          entry = {
              "title": "Awaiting source connection",
              "source": "System",
              "date": today,
              "url": "#",
              "excerpt": "Daily workflow is active.",
              "summary": "The daily automation is running. Connect a news source next to replace this placeholder with a real article."
          }

          archive = []
          if os.path.exists(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      archive = json.load(f)
              except Exception:
                  archive = []

          if not archive or archive[0].get("date") != today:
              archive.insert(0, entry)

          with open(path, "w", encoding="utf-8") as f:
              json.dump(archive, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/archive.json
          git diff --cached --quiet || git commit -m "Daily Buckfast update"
          git push
