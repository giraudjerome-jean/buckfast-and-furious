name: Update archive

on:
  schedule:
    - cron: '0 * * * *' # toutes les heures
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch RSS and update archive
        run: |
          curl -s "https://api.rss2json.com/v1/api.json?rss_url=https://www.google.com/alerts/feeds/02891315752029914665/15910925906449957310" > feed.json

          if [ ! -f archive.json ]; then
            echo "[]" > archive.json
          fi

          node <<EOF
          const fs = require('fs');

          const feed = JSON.parse(fs.readFileSync('feed.json'));
          let archive = JSON.parse(fs.readFileSync('archive.json'));

          const items = feed.items || [];

          items.forEach(item => {
            if (!archive.find(a => a.link === item.link)) {
              archive.unshift(item);
            }
          });

          fs.writeFileSync('archive.json', JSON.stringify(archive, null, 2));
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add archive.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update archive"
          git push
