<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buckfast and Furious</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f35a08;
  color:#050505;
}

header{
  padding:60px 40px;
}

h1{
  font-size:110px;
  line-height:0.9;
  margin:0;
}

#lang{
  margin-top:20px;
}

button{
  cursor:pointer;
  padding:6px 10px;
  border:1px solid #050505;
  background:transparent;
  margin-right:5px;
}

#feed{
  padding:40px;
  border-top:1px solid #050505;
}

.entry{
  margin-bottom:60px;
}

.entry-title{
  font-size:40px;
  font-weight:bold;
  max-width:900px;
}

.entry-summary{
  margin-top:10px;
  max-width:700px;
}

.story{
  margin-top:10px;
}

.story-card{
  width:1080px;
  height:1920px;
  background:#f35a08;
  color:#050505;
  padding:80px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-sizing:border-box;
}

.story-title{
  font-size:80px;
  line-height:1.05;
}

#export-wrap{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#export-wrap.active{
  display:flex;
}

</style>
</head>

<body>

<header>
<h1>Buckfast<br>and<br>Furious</h1>

<div id="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>

</header>

<div id="feed"></div>

<div id="export-wrap">
  <div>
    <div id="story-card" class="story-card">
      <div>
        <div id="story-date"></div>
        <div id="story-title" class="story-title"></div>
      </div>
      <div>buckfastandfurious.com</div>
    </div>

    <br>

    <button id="download">Download</button>
    <button id="close">Close</button>
  </div>
</div>

<script>

const FEEDS = [
  "https://news.google.com/rss/search?q=buckfast+crime&hl=en-GB&gl=GB&ceid=GB:en",
  "https://news.google.com/rss/search?q=buckfast&hl=en-GB&gl=GB&ceid=GB:en"
];

let allEntries=[];
let lang="en";

function rss(url){
return "https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(url);
}

// 🔥 filtre simple (ne casse pas tout)
function shouldHide(e){
const t=(e.title||"").toLowerCase();

if(
t.includes("amazon")||
t.includes("ebay")||
t.includes("etsy")||
t.includes("buy")||
t.includes("price")||
t.includes("pack")
)return true;

return false;
}

// 🔥 traduction légère
function translate(text){
if(lang==="en") return text;

return text
.replace(/man/gi,"homme")
.replace(/woman/gi,"femme")
.replace(/arrested/gi,"arrêté")
.replace(/attack/gi,"attaque")
.replace(/charged/gi,"inculpé");
}

function setLang(l){
lang=l;
render();
}

async function load(){

let items=[];

for(const f of FEEDS){
try{
const data=await fetch(rss(f)).then(r=>r.json());
items=items.concat(data.items||[]);
}catch{}
}

const seen=new Set();

allEntries=items.filter(e=>{
if(!e.link) return false;
if(shouldHide(e)) return false;

const key=e.link.split("?")[0];

if(seen.has(key)) return false;
seen.add(key);

return true;
});

render();
}

function render(){

const feed=document.getElementById("feed");
feed.innerHTML="";

allEntries.forEach(e=>{

const div=document.createElement("div");
div.className="entry";

div.innerHTML=`
<div class="entry-title">${translate(e.title)}</div>
<div class="entry-summary">${translate((e.description||"").slice(0,200))}</div>
<button class="story">Story</button>
`;

div.querySelector(".story").onclick=()=>openStory(e);

feed.appendChild(div);

});
}

function openStory(e){

document.getElementById("story-title").innerText=translate(e.title);
document.getElementById("story-date").innerText=new Date(e.pubDate).toDateString();

document.getElementById("export-wrap").classList.add("active");
}

document.getElementById("close").onclick=()=>{
document.getElementById("export-wrap").classList.remove("active");
};

document.getElementById("download").onclick=async ()=>{

const canvas=await html2canvas(document.getElementById("story-card"));

const link=document.createElement("a");
link.download="story.png";
link.href=canvas.toDataURL();
link.click();

};

load();

</script>

</body>
</html>
