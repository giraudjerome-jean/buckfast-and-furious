<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buckfast and Furious</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

header{
  padding:40px;
}

h1{
  font-size:48px;
}

#feed{
  padding:40px;
}

.entry{
  margin-bottom:40px;
}

.entry-title{
  font-size:22px;
}

.entry-summary{
  color:#666;
}

.story-card{
  width:1080px;
  height:1920px;
  background:#f35a08;
  color:#fff;
  padding:80px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-sizing:border-box;
}

.story-title{
  font-size:70px;
  line-height:1.1;
  word-break:break-word;
}

.story-site{
  font-size:22px;
}

#export-wrap{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#export-wrap.active{
  display:flex;
}
</style>
</head>

<body>

<header>
<h1>Buckfast and Furious</h1>
</header>

<div id="feed"></div>

<div id="export-wrap">
  <div>
    <div id="story-card" class="story-card">
      <div>
        <div id="story-date"></div>
        <div id="story-title" class="story-title"></div>
      </div>
      <div id="story-site">buckfastandfurious.com</div>
    </div>

    <br>

    <button id="download">Download</button>
    <button id="close">Close</button>
  </div>
</div>

<script>

const FEEDS = [
  "https://www.google.com/alerts/feeds/02891315752029914665/15910925906449957310",
  "https://www.google.com/alerts/feeds/02891315752029914665/4370149902045499391",

  // Google News (amélioré)
  "https://news.google.com/rss/search?q=buckfast+crime&hl=en-GB&gl=GB&ceid=GB:en",

  // 🔥 backup qui marche toujours
  "https://news.google.com/rss/search?q=buckfast&hl=en-GB&gl=GB&ceid=GB:en"
];

let allEntries=[];

function rss(url){
return "https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(url);
}

function shouldHide(entry){

const t=(entry.title||"").toLowerCase();

if(t.includes("buckfast way")) return true;
if(t.includes("gas works")) return true;
if(t.includes("product")) return true;
if(t.includes("buy")) return true;

return false;
}

async function load(){

let archive=[];

try{
archive=await fetch("archive.json").then(r=>r.json());
}catch{}

let items=[];

for(const f of FEEDS){
try{
const data=await fetch(rss(f)).then(r=>r.json());
items=items.concat(data.items||[]);
}catch{}
}

items.forEach(item=>{
if(!archive.find(a=>a.link===item.link)){
archive.unshift(item);
}
});

archive.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));

const seen=new Set();

allEntries=archive.filter(e=>{
if(!e.link) return false;

if(shouldHide(e)) return false;

const key=e.link.split("?")[0];

if(seen.has(key)) return false;
seen.add(key);

return true;
});

render();
}

function render(){

const feed=document.getElementById("feed");
feed.innerHTML="";

allEntries.forEach(e=>{

const div=document.createElement("div");
div.className="entry";

div.innerHTML=`
<div class="entry-title">${e.title}</div>
<div class="entry-summary">${(e.description||"").slice(0,200)}</div>
<button class="story">Story</button>
`;

div.querySelector(".story").onclick=()=>openStory(e);

feed.appendChild(div);

});
}

function openStory(e){

document.getElementById("story-title").innerText=e.title;
document.getElementById("story-date").innerText=new Date(e.pubDate).toDateString();

document.getElementById("export-wrap").classList.add("active");
}

document.getElementById("close").onclick=()=>{
document.getElementById("export-wrap").classList.remove("active");
};

document.getElementById("download").onclick=async ()=>{

const canvas=await html2canvas(document.getElementById("story-card"));

const link=document.createElement("a");
link.download="story.png";
link.href=canvas.toDataURL();
link.click();

};

load();

</script>

</body>
</html>
